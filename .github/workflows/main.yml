name: Build ImmortalWrt for DoorNet2

on:
  workflow_dispatch:          # 允许手动触发
  push:
    branches:
      - main                  # 推送到 main 分支自动编译
    paths-ignore:
      - 'README.md'           # 忽略非源码文件

env:
  REPO_URL: https://github.com/dreak7/immortalwrt.git
  REPO_BRANCH: master         # 使用的 ImmortalWrt 主分支

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: custom-files   # 将当前仓库作为自定义文件检出

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 --branch $REPO_BRANCH $REPO_URL immortalwrt
          echo "SRC_DIR=$PWD/immortalwrt" >> $GITHUB_ENV

      - name: Copy custom files
        run: |
          rsync -av custom-files/ immortalwrt/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync unzip zlib1g-dev file wget

      - name: Update feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate base config
        working-directory: immortalwrt
        run: |
          # 写入最基础的平台和设备选项
          cat > .config <<EOF
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_doornet2=y
          EOF
          make defconfig

      - name: Apply diff.config if present
        working-directory: immortalwrt
        run: |
          if [ -f diff.config ]; then
            echo "Applying custom diff.config..."
            cat diff.config >> .config
            make defconfig
          else
            echo "No diff.config found, skipping."
          fi

      - name: Download all sources
        working-directory: immortalwrt
        run: make download -j$(nproc) V=s

      - name: Prepare kernel and add DTS entry
        working-directory: immortalwrt
        run: |
          make target/linux/prepare V=s
          find build_dir -name "Makefile" -path "*/dts/rockchip/Makefile" | while read f; do
            echo "dtb-\$(CONFIG_ARCH_ROCKCHIP) += rk3399-doornet2.dtb" >> "$f"
          done

      - name: Build firmware
        working-directory: immortalwrt
        run: make -j$(nproc) V=s || make -j1 V=s

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cp immortalwrt/bin/targets/rockchip/armv8/*doornet2*.img.gz artifacts/ 2>/dev/null || \
          cp immortalwrt/bin/targets/rockchip/armv8/*.img.gz artifacts/
          cp immortalwrt/bin/targets/rockchip/armv8/*.manifest artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-DoorNet2
          path: artifacts/
