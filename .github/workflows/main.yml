name: Build ImmortalWrt for DoorNet2

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
    paths-ignore:
      - README.md

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync unzip zlib1g-dev file wget

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_doornet2=y
          EOF

          if [ -f diff.config ]; then
            cat diff.config >> .config
          fi

          make defconfig

      - name: Download all sources
        run: make download -j$(nproc) V=s

      - name: Build firmware
        run: make -j1 V=s

      - name: Debug build output on failure
        if: failure()
        run: |
          echo "=== U-Boot staging output ==="
          find staging_dir -name "*doornet*" -o -name "*rk3399*idbloader*" -o -name "*rk3399*trust*" 2>/dev/null || true
          echo ""
          echo "=== U-Boot build output ==="
          find build_dir -name "*doornet*" -o -name "*u-boot*.log" 2>/dev/null || true
          echo ""
          echo "=== Rockchip target output ==="
          find bin/targets/rockchip/armv8 -maxdepth 1 -type f 2>/dev/null || true

      - name: Package artifacts
        if: success()
        run: |
          mkdir -p artifacts
          cp bin/targets/rockchip/armv8/*doornet2*.img.gz artifacts/
          cp bin/targets/rockchip/armv8/*.manifest artifacts/ 2>/dev/null || true
          cp bin/targets/rockchip/armv8/*.buildinfo artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-DoorNet2
          path: artifacts/
