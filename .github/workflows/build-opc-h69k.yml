name: Build HINLINK OPC-H69K Firmware

on:
  push:
    branches: [master]
    paths:
      - 'target/linux/rockchip/**'
      - '.github/workflows/build-opc-h69k.yml'
      - '.github/config-hinlink-opc-h69k.seed'
      - 'feeds.conf.default'
  pull_request:
    branches: [master]
    paths:
      - 'target/linux/rockchip/**'
      - '.github/workflows/build-opc-h69k.yml'
      - '.github/config-hinlink-opc-h69k.seed'
      - 'feeds.conf.default'
  workflow_dispatch:

jobs:
  build:
    name: Build OpenWrt for OPC-H69K
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3 python3-dev python3-distutils \
            rsync unzip zlib1g-dev file wget \
            libelf-dev dwarves ccache \
            golang-go nodejs npm

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-opc-h69k
          max-size: 2G

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cp .github/config-hinlink-opc-h69k.seed .config
          make defconfig

      - name: Download all source packages
        run: make download -j$(nproc)

      - name: Build toolchain
        run: make tools/compile -j$(nproc) && make toolchain/compile -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc) V=s

      - name: Show build summary
        run: |
          echo "=== Build Output ==="
          find bin/targets/rockchip/armv8/ -type f ! -name "*.manifest" -exec ls -lh {} \;

      - name: Prepare artifacts
        run: |
          mkdir -p release
          cp -r bin/targets/rockchip/armv8/* release/ 2>/dev/null || true
          find release/ -type f -name "*.manifest" -exec rm {} \;

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hinlink-opc-h69k-firmware
          path: release/
          retention-days: 30
