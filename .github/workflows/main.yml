name: Build ImmortalWrt for DoorNet2

on:
  workflow_dispatch:          # 允许手动触发
  push:
    branches:
      - main                  # 推送到 main 分支自动编译
    paths-ignore:
      - 'README.md'           # 忽略非源码文件

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master         # 使用的 ImmortalWrt 主分支

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: custom-files   # 将当前仓库作为自定义文件检出

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 --branch $REPO_BRANCH $REPO_URL immortalwrt
          cd immortalwrt
          echo "SRC_DIR=$PWD" >> $GITHUB_ENV

      - name: Copy custom files
        run: |
          # 将你上传的修改同步到 ImmortalWrt 源码树中
          rsync -av custom-files/ immortalwrt/
          # 如果有单独放 config 或者补丁，也可以在这里处理
          # cp custom-files/target/linux/rockchip/patches-6.6/*.patch immortalwrt/target/linux/rockchip/patches-6.6/
          # 等等

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync unzip zlib1g-dev file wget

      - name: Update feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate base config
        working-directory: immortalwrt
        run: |
          # 生成最基本的 .config，指定目标平台和 sub target
          cat > .config <<EOF
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_embedfire_doornet2=y
          EOF
          make defconfig

      - name: Customize config (optional)
        working-directory: immortalwrt
        run: |
          # 将上一轮定好的极简配置注入
          [ -e diff.config ] && mv diff.config openwrt/.config
          cd openwrt
          make defconfig

      - name: Download all sources
        working-directory: immortalwrt
        run: make download -j$(nproc) V=s

      - name: Build firmware
        working-directory: immortalwrt
        run: make -j$(nproc) V=s || make -j1 V=s  # 若并行失败则单线程重试

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cp immortalwrt/bin/targets/rockchip/armv8/*doornet2*.img.gz artifacts/ 2>/dev/null || \
          cp immortalwrt/bin/targets/rockchip/armv8/*.img.gz artifacts/
          cp immortalwrt/bin/targets/rockchip/armv8/*.manifest artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-DoorNet2
          path: artifacts/
